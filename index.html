<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISOGuardian - Enterprise ISO Management Platform</title>
    <meta name="description" content="ISOGuardian: Enterprise ISO compliance management platform for ISO 9001, ISO 14001, and ISO 45001. Secure, POPIA-compliant QMS software for South African businesses." />
    <meta name="keywords" content="ISO compliance, ISO 9001, ISO 14001, ISO 45001, quality management system, QMS, POPIA compliance, South Africa" />
    <meta property="og:title" content="ISOGuardian - Enterprise ISO Management" />
    <meta property="og:description" content="Your Shield Against Non-Compliance. Enterprise ISO management platform for South African businesses." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://isoguardian.co.za/" />
    <meta property="og:site_name" content="ISOGuardian" />
    <meta property="og:image" content="https://isoguardian.co.za/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ISOGuardian - Your Shield Against Non-Compliance" />
    <meta name="twitter:description" content="Enterprise ISO compliance management platform for South African businesses. ISO 9001, 14001, 45001." />
    <meta name="twitter:image" content="https://isoguardian.co.za/og-image.png" />
    <link rel="canonical" href="https://isoguardian.co.za/" />

    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
  </head>
  <body>
    <!-- Preloader: shown before React mounts -->
    <div id="preloader" style="
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0a0e1a;
      transition: opacity 0.4s ease-out, visibility 0.4s ease-out;
    ">
      <!-- Logo with animated ring -->
      <div style="position: relative; width: 90px; height: 90px;">
        <svg viewBox="0 0 90 90" style="position: absolute; inset: 0; animation: preloader-spin 1.2s linear infinite;">
          <circle cx="45" cy="45" r="42" fill="none" stroke="rgba(6,182,212,0.1)" stroke-width="2" />
          <circle cx="45" cy="45" r="42" fill="none" stroke="url(#preloader-grad)" stroke-width="2"
            stroke-dasharray="200 264" stroke-linecap="round" />
          <defs><linearGradient id="preloader-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#06b6d4" />
            <stop offset="100%" stop-color="#8b5cf6" />
          </linearGradient></defs>
        </svg>
        <div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;">
          <img src="/isoguardian-logo.png" alt="ISOGuardian" style="width: 52px; height: 52px; object-fit: contain; border-radius: 12px;" />
        </div>
      </div>
      <p style="
        margin-top: 20px; color: #fff; font-size: 15px; font-weight: 700;
        letter-spacing: 0.05em;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      ">ISOGuardian</p>
      <div style="
        margin-top: 12px; width: 120px; height: 2px;
        background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;
      ">
        <div id="preloader-bar" style="
          height: 100%; width: 0%;
          background: linear-gradient(to right, #06b6d4, #8b5cf6);
          border-radius: 2px; transition: width 0.2s ease;
        "></div>
      </div>
    </div>

    <style>
      @keyframes preloader-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
