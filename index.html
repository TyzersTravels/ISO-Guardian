<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISOGuardian - Enterprise ISO Management Platform</title>
    <meta name="description" content="ISOGuardian: Enterprise ISO compliance management platform for ISO 9001, ISO 14001, and ISO 45001. Secure, POPIA-compliant QMS software for South African businesses." />
    <meta name="keywords" content="ISO compliance, ISO 9001, ISO 14001, ISO 45001, quality management system, QMS, POPIA compliance, South Africa" />
    <meta property="og:title" content="ISOGuardian - Enterprise ISO Management" />
    <meta property="og:description" content="Your Shield Against Non-Compliance. Enterprise ISO management platform for South African businesses." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://isoguardian.co.za/" />
    <meta property="og:site_name" content="ISOGuardian" />
    <meta property="og:image" content="https://isoguardian.co.za/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ISOGuardian - Your Shield Against Non-Compliance" />
    <meta name="twitter:description" content="Enterprise ISO compliance management platform for South African businesses. ISO 9001, 14001, 45001." />
    <meta name="twitter:image" content="https://isoguardian.co.za/og-image.png" />
    <link rel="canonical" href="https://isoguardian.co.za/" />

    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
  </head>
  <body>
    <!-- Preloader: shown before React mounts -->
    <div id="preloader" style="
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(to bottom right, #0f172a, #1e1044, #0f172a);
      transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
    ">
      <div style="position: relative;">
        <div style="
          position: absolute; inset: -20px; border-radius: 50%;
          background: radial-gradient(circle, rgba(6,182,212,0.15) 0%, transparent 70%);
          animation: preloader-glow 2s ease-in-out infinite;
        "></div>
        <img src="/isoguardian-logo.png" alt="ISOGuardian" style="
          width: 140px; height: 140px; object-fit: contain; position: relative; z-index: 1;
          animation: preloader-pulse 2s ease-in-out infinite;
        " />
      </div>
      <p style="
        margin-top: 28px; color: rgba(6,182,212,0.9); font-size: 13px;
        font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      ">
        Loading...
      </p>
      <div style="
        margin-top: 16px; width: 200px; height: 3px;
        background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden;
      ">
        <div id="preloader-bar" style="
          height: 100%; width: 0%;
          background: linear-gradient(to right, #06b6d4, #8b5cf6);
          border-radius: 4px; transition: width 0.3s ease;
        "></div>
      </div>
    </div>

    <style>
      @keyframes preloader-pulse {
        0%, 100% { transform: scale(1); filter: drop-shadow(0 0 8px rgba(6,182,212,0.3)); }
        50% { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(6,182,212,0.5)); }
      }
      @keyframes preloader-glow {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.1); }
      }
    </style>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
